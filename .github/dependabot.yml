version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: scope
    groups:
      aws-cdk:
        patterns:
          - "aws-cdk*"
          - "cdk-nag"
          - "constructs"
      dev-dependencies:
        dependency-type: development

  # GitHub Actions versions (OpenSSF Scorecard: keep actions current)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
