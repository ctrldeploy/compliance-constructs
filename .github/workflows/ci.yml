name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for all jobs (OpenSSF Scorecard: Token-Permissions)
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build · lint · test · synth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Lint & format check (biome)
        run: npx biome ci .

      - name: Build
        run: npm run build

      - name: Test (cdk-nag compliance gate + snapshots)
        run: npm test -- --coverage

      - name: Synth (compliance gate at synth time)
        run: npx cdk synth --quiet
        env:
          CDK_DEFAULT_ACCOUNT: "111111111111"
          CDK_DEFAULT_REGION: us-east-1

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
